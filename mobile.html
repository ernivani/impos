<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ImposOS Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="phone">
  <div id="screen">
    <img id="wp" src="mobile_wallpaper.jpg" alt="">
    <div id="cam-dot"></div>
    <div id="statusbar">
      <span id="sb-time"></span>
      <div id="sb-icons"></div>
    </div>
    <div id="lockscreen"></div>
    <div id="homescreen"></div>
    <div id="app-drawer"></div>
    <div id="app-sheet"></div>
    <div id="cc-overlay"></div>
    <div id="control-center"></div>
    <div id="dock"></div>
    <div id="gesture-bar"><div class="gesture-pill"></div></div>
  </div>
</div>
<script src="mobile.js"></script>
</body>
</html>
